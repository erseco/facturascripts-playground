site_name: FacturaScripts Playground Docs
site_description: Contributor and user documentation for FacturaScripts Playground.
site_url: https://erseco.github.io/facturascripts-playground/docs/
repo_url: https://github.com/erseco/facturascripts-playground
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
theme:
  name: material
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Playground model: wordpress-playground.md
  - blueprint.json: blueprint-json.md
  - Development: development.md
  - GitHub Action PR Preview: github-action-pr-preview.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
