name: Deploy Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "23 4 * * *"
  pull_request:
    branches: ["main"]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: 8cdbd0eb9712b3a9a3e9b860fd87ed6c
  CLOUDFLARE_PAGES_PROJECT: facturascripts-playground
  PREVIEW_BUTTON_IMG: https://raw.githubusercontent.com/erseco/facturascripts-playground/main/assets/playground-preview-button.svg

jobs:
  discover-versions:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.versions.outputs.changed }}
      matrix: ${{ steps.versions.outputs.matrix }}
      stable: ${{ steps.versions.outputs.stable }}
      index: ${{ steps.versions.outputs.index }}
    steps:
      - name: Read official supported channels
        id: versions
        run: |
          set -euo pipefail

          channel_version() {
            local channel="$1" headers version
            headers=$(curl --fail --silent --show-error --location --head \
              "https://facturascripts.com/DownloadBuild/1/${channel}")
            version=$(sed -nE 's/.*filename="?CORE-([0-9]{4}(\.[0-9]+)?)\.zip"?.*/\1/ip' \
              <<< "$headers" | tail -1)
            [[ "$version" =~ ^[0-9]{4}(\.[0-9]+)?$ ]] || {
              echo "Could not detect FacturaScripts ${channel}" >&2
              exit 1
            }
            printf '%s' "$version"
          }

          stable=$(channel_version stable)
          beta=$(channel_version beta)
          if [[ "$stable" == "$beta" ]]; then
            matrix=$(jq -nc --arg version "$stable" \
              '{include: [{version: $version, channels: "stable,beta"}]}')
            index=$(jq -nc --arg version "$stable" \
              '{schemaVersion: 1, default: $version, versions: [{version: $version, channels: ["stable", "beta"], label: ($version + " (Stable & Beta)")}]}')
          else
            matrix=$(jq -nc --arg stable "$stable" --arg beta "$beta" \
              '{include: [{version: $stable, channels: "stable"}, {version: $beta, channels: "beta"}]}')
            index=$(jq -nc --arg stable "$stable" --arg beta "$beta" \
              '{schemaVersion: 1, default: $stable, versions: [{version: $stable, channels: ["stable"], label: ($stable + " (Stable)")}, {version: $beta, channels: ["beta"], label: ($beta + " (Beta)")}]}')
          fi

          changed=true
          if [[ "$GITHUB_EVENT_NAME" == schedule ]]; then
            deployed=$(curl --fail --silent --show-error \
              'https://facturascripts-playground.pages.dev/assets/manifests/versions.json' || true)
            if [[ -n "$deployed" ]] && \
              [[ "$(jq -S -c . <<< "$deployed")" == "$(jq -S -c . <<< "$index")" ]]; then
              changed=false
            fi
          fi

          {
            echo "changed=$changed"
            echo "matrix=$matrix"
            echo "stable=$stable"
            echo "index=$index"
          } >> "$GITHUB_OUTPUT"
          {
            echo '# Supported FacturaScripts versions'
            echo "- Stable: $stable"
            echo "- Beta: $beta"
          } >> "$GITHUB_STEP_SUMMARY"

  build-core:
    needs: discover-versions
    if: needs.discover-versions.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-versions.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install bundle dependencies
        run: npm install

      - name: Build supported FacturaScripts core
        env:
          FS_VERSION: ${{ matrix.version }}
          MANIFEST_FILE: ${{ matrix.version }}.json
          UPDATE_CONFIG: "false"
        run: npm run bundle

      - name: Verify SQLite bundle inputs
        run: |
          test -f ".cache/build-facturascripts/stage/facturascripts/Core/Base/DataBase/SqliteEngine.php"
          test -f "assets/manifests/${{ matrix.version }}.json"
          jq -e --arg version "${{ matrix.version }}" \
            '.release == $version and .bundle.format == "tar.zst" and .bundle.fileCount > 0' \
            "assets/manifests/${{ matrix.version }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: facturascripts-core-${{ matrix.version }}
          path: |
            assets/facturascripts/*.tar.zst
            assets/manifests/${{ matrix.version }}.json
          if-no-files-found: error
          retention-days: 1

  build:
    needs:
      - discover-versions
      - build-core
    if: needs.discover-versions.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6
        if: github.event_name != 'pull_request'

      - uses: actions/setup-node@v7
        with:
          # Node 24 (LTS) provides native node:zlib zstd (>= 22.15), required by
          # scripts/build-tar-zst-bundle.mjs to pack the streaming tar.zst core.
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm install

      - name: Prepare runtime assets
        run: |
          npm run sync-browser-deps
          npm run build-worker
          npm run prepare-runtime

      - name: Download supported FacturaScripts bundles
        uses: actions/download-artifact@v5
        with:
          pattern: facturascripts-core-*
          path: assets
          merge-multiple: true

      - name: Publish version index and stable alias
        env:
          STABLE_VERSION: ${{ needs.discover-versions.outputs.stable }}
          VERSIONS_INDEX: ${{ needs.discover-versions.outputs.index }}
        run: |
          printf '%s\n' "$VERSIONS_INDEX" | jq . > assets/manifests/versions.json
          cp "assets/manifests/${STABLE_VERSION}.json" assets/manifests/latest.json
          config_tmp=$(mktemp)
          jq --arg version "${STABLE_VERSION}-${GITHUB_SHA::12}" \
            '.bundleVersion = $version' playground.config.json > "$config_tmp"
          mv "$config_tmp" playground.config.json

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/docs _site/dist
          rsync -a ./ ./_site/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude ".cache/" \
            --exclude "_site/" \
            --exclude "docs/" \
            --exclude "node_modules/" \
            --exclude "site/"
          mkdocs build --strict --site-dir _site/docs
          touch _site/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      # ── Cloudflare Pages (Direct Upload) ──
      - name: Deploy to Cloudflare Pages (production)
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4 pages deploy _site --project-name="$CLOUDFLARE_PAGES_PROJECT" --branch=main --commit-dirty=true

      - name: Deploy to Cloudflare Pages (PR preview)
        id: cf_preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          out=$(npx --yes wrangler@4 pages deploy _site \
            --project-name="$CLOUDFLARE_PAGES_PROJECT" \
            --branch="$HEAD_REF" --commit-dirty=true 2>&1 | tee /dev/stderr)
          proj="$CLOUDFLARE_PAGES_PROJECT"
          urls=$(printf '%s\n' "$out" | grep -oE "https://[a-z0-9-]+\.${proj}\.pages\.dev" | sort -u)
          deploy_url=$(printf '%s\n' "$urls" | grep -E "https://[0-9a-f]{8}\.${proj}\." | head -n1)
          alias_url=$(printf '%s\n' "$urls" | grep -vE "https://[0-9a-f]{8}\.${proj}\." | head -n1)
          { echo "deploy_url=$deploy_url"; echo "alias_url=$alias_url"; } >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEPLOY_URL: ${{ steps.cf_preview.outputs.deploy_url }}
          ALIAS_URL: ${{ steps.cf_preview.outputs.alias_url }}
        run: |
          MARKER='<!-- cf-preview -->'
          LOGO='https://user-images.githubusercontent.com/23264/106598434-9e719e00-654f-11eb-9e59-6167043cfa01.png'
          SHA7=$(printf '%s' "$HEAD_SHA" | cut -c1-7)
          ALIAS="$ALIAS_URL"
          if [ -z "$ALIAS" ]; then
            slug=$(printf '%s' "$HEAD_REF" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-28 | sed -E 's/-+$//')
            ALIAS="https://${slug}.${CLOUDFLARE_PAGES_PROJECT}.pages.dev"
          fi
          DEPLOY="${DEPLOY_URL:-$ALIAS}"
          if [ -n "$DEPLOY_URL" ] || [ -n "$ALIAS_URL" ]; then
            BODY=$(printf '%s\n## Deploying %s with &nbsp;<img alt="Cloudflare Pages" src="%s" width="16">&nbsp; Cloudflare Pages\n\n<a href="%s" target="_blank" rel="noopener noreferrer"><img src="%s" alt="Try on the Playground" height="51"></a>\n\n|  |  |\n| :-- | :-- |\n| **Latest commit** | `%s` |\n| **Preview URL (branch)** | %s |\n| **Deployment URL (commit)** | %s |' \
              "$MARKER" "$CLOUDFLARE_PAGES_PROJECT" "$LOGO" "$ALIAS" "$PREVIEW_BUTTON_IMG" "$SHA7" "$ALIAS" "$DEPLOY")
          else
            BODY=$(printf '%s\n## Deploying %s with Cloudflare Pages\n\n⚠️ Preview deploy failed — see the workflow logs.\n\nBranch `%s`' \
              "$MARKER" "$CLOUDFLARE_PAGES_PROJECT" "$HEAD_REF")
          fi
          CID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "map(select(.body|startswith(\"$MARKER\")))|.[0].id // empty")
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$CID" -f body="$BODY" >/dev/null
          else
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$BODY" >/dev/null
          fi

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
