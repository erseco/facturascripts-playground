name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check src/shared/blueprint.js
          node --check src/runtime/bootstrap.js

      - name: Run tests
        run: make test

      - name: Lint
        run: make lint

