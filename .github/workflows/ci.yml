name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Least-privilege GITHUB_TOKEN: the test/lint/e2e jobs only read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          # Node 24 (LTS) provides native node:zlib zstd (>= 22.15). The e2e
          # webServer runs `make up` (build-tar-zst-bundle.mjs) when no bundle is
          # present, so the bundle build needs it here too.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check src/shared/blueprint.js
          node --check src/shared/config.js
          node --check src/shared/paths.js
          node --check src/shared/storage.js
          node --check src/runtime/bootstrap.js
          node --check src/runtime/addons.js
          node --check src/runtime/crash-recovery.js
          node --check src/runtime/manifest.js
          node --check src/runtime/networking.js
          node --check src/runtime/php-compat.js
          node --check src/runtime/php-loader.js
          node --check src/runtime/vfs.js
          node --check src/runtime/wizard-script.js
          node --check lib/streaming-tar-extract.js
          node --check scripts/lib/tar-ustar.mjs
          node --check lib/facturascripts-loader.js
          node --check src/remote/main.js
          node --check src/shell/main.js
          node --check php-worker.js
          node --check sw.js

      - name: Run tests
        run: make test

      - name: Lint
        run: make lint

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
