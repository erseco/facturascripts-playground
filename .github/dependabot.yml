version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Group all @php-wasm/* packages into a single PR. They are always
    # released together with the same version, so separate PRs would race
    # against each other and produce inconsistent lockfile states.
    groups:
      php-wasm:
        patterns:
          - "@php-wasm/*"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Enable this block only if you add a composer.json/composer.lock
  # to this repository later.
  #
  # - package-ecosystem: "composer"
